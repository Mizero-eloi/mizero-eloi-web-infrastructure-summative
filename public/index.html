<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Job Search & Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1> Developer Job Search & Analytics</h1>
            <p class="subtitle">Find your next opportunity with real-time job data and insights</p>
        </header>

        <div class="search-section">
            <div class="search-form">
                <div class="form-group">
                    <label for="jobQuery">Job Title / Keywords</label>
                    <input type="text" id="jobQuery" placeholder="e.g., Software Engineer, Python Developer" value="developer">
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <select id="location">
                        <option value="us">United States</option>
                        <option value="gb">United Kingdom</option>
                        <option value="ca">Canada</option>
                        <option value="au">Australia</option>
                        <option value="de">Germany</option>
                        <option value="fr">France</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="salaryMin">Min Salary (USD)</label>
                    <input type="number" id="salaryMin" placeholder="Optional" min="0">
                </div>
                <div class="form-group">
                    <label for="salaryMax">Max Salary (USD)</label>
                    <input type="number" id="salaryMax" placeholder="Optional" min="0">
                </div>
                <button id="searchBtn" class="btn-primary">Search Jobs</button>
            </div>
        </div>

        <div class="filters-section" id="filtersSection" style="display: none;">
            <div class="filters">
                <div class="filter-group">
                    <label for="sortBy">Sort By:</label>
                    <select id="sortBy">
                        <option value="relevance">Relevance</option>
                        <option value="date">Date Posted</option>
                        <option value="salary_desc">Salary (High to Low)</option>
                        <option value="salary_asc">Salary (Low to High)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchFilter">Filter Results:</label>
                    <input type="text" id="searchFilter" placeholder="Search in results...">
                </div>
            </div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Searching for jobs...</p>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <div class="results-header" id="resultsHeader" style="display: none;">
            <h2 id="resultsCount"></h2>
            <div class="pagination" id="pagination"></div>
        </div>

        <div class="jobs-container" id="jobsContainer"></div>

        <div class="no-results" id="noResults" style="display: none;">
            <p>No jobs found matching your criteria. Try adjusting your search parameters.</p>
        </div>
    </div>

    <footer>
        <p>Powered by <a href="https://developer.adzuna.com/" target="_blank" rel="noopener noreferrer">Adzuna API</a></p>
        <p>Data provided by Adzuna - Real-time job search data</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
