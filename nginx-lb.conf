# Nginx Load Balancer Configuration
# Place this file in /etc/nginx/sites-available/load-balancer
# Then create a symlink: sudo ln -s /etc/nginx/sites-available/load-balancer /etc/nginx/sites-enabled/

# Upstream backend servers
upstream backend {
    # Round-robin load balancing (default)
    # Replace these IPs with your actual web server IPs or hostnames
    server web01_ip_address:3000;
    server web02_ip_address:3000;
    
    # Alternative: Least connections
    # least_conn;
    
    # Alternative: IP hash for session persistence
    # ip_hash;
    
    # Alternative: Weighted round-robin
    # server web01_ip:3000 weight=3;
    # server web02_ip:3000 weight=1;
}

server {
    listen 80;
    server_name _;  # Replace with your domain name if available

    # Logging
    access_log /var/log/nginx/job-search-access.log;
    error_log /var/log/nginx/job-search-error.log;

    # Main location block
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Headers for proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Health check and failover
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static files (if serving directly)
    location /static/ {
        alias /var/www/developer-job-search/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

