# Nginx Configuration for Web Servers (Web01 and Web02)
# Place this file in /etc/nginx/sites-available/job-search
# Then create a symlink: sudo ln -s /etc/nginx/sites-available/job-search /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Replace with your domain name if available

    # Logging
    access_log /var/log/nginx/job-search-access.log;
    error_log /var/log/nginx/job-search-error.log;

    location / {
        # Proxy to Node.js application
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers for proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3000/health;
        access_log off;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

